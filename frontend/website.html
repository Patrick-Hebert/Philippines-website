<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Philippines Travel Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f4f4f4;
      color: #333;
    }

    header {
      background-color: #0077b6;
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }

    .intro {
      text-align: center;
      margin: 30px 0;
      font-size: 1.1rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
    }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      font-size: 0.9rem;
      color: #777;
    }
  </style>
</head>

<body>

  <header>
    <h1>Welcome to My Philippines Travel Site 🇵🇭</h1>
  </header>

  <div class="container">

    <div class="intro">
      <p>
        Welcome to my website about the Philippines. This site is currently under construction,
        so enjoy some photos of my trips there in the meantime.
      </p>
    </div>

    <div class="gallery">
  <img src="photos/2016-binaliw.JPG" alt="Binaliw 2016">
  <img src="photos/2016-boracay-with-family.jpg" alt="Boracay with family">
  <img src="photos/2016-caticlan.JPG" alt="Caticlan 2016">
  <img src="photos/2016-kalibo-with-boss-2.JPG" alt="Kalibo with boss">
  <img src="photos/2016-kalibo-with-boss.JPG" alt="Kalibo 2016">
  <img src="photos/2016-manila-ermita-with-ren-2.jpg" alt="Manila Ermita">
  <img src="photos/2016-manila-ermita-with-ren.jpg" alt="Manila Ermita with Ren">
  <img src="photos/2016-manila-with-danica.JPG" alt="Manila with Danica">
  <img src="photos/2016-manila-with-reynalie.JPG" alt="Manila with Reynalie">
  <img src="photos/2018-bachoy.jpeg" alt="Bachoy 2018">
  <img src="photos/2018-boss-janrey-wedding.jpeg" alt="Boss Janrey wedding">
  <img src="photos/2018-bvs-soccer.jpeg" alt="BVS soccer">
  <img src="photos/2018-lolo-joe-house-2.jpeg" alt="Lolo Joe house">
  <img src="photos/2018-lolo-joe-house.jpeg" alt="Lolo Joe house">
  <img src="photos/2018-municipal-hall.jpeg" alt="Municipal hall">
  <img src="photos/2018-tuba-farm.jpeg" alt="Tuba farm">
</div>

  </div>

  <footer>
    © 2026 My Philippines Travel Project — Under Construction
  </footer>

</body>
</html>
