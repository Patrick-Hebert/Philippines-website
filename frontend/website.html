<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Philippines Travel Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f4f4f4;
      color: #333;
    }

    header {
      background-color: #0077b6;
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }

    .intro {
      text-align: center;
      margin: 30px 0;
      font-size: 1.1rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
    }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      font-size: 0.9rem;
      color: #777;
    }
  </style>
</head>

<body>

  <header>
    <h1>Welcome to My Philippines Travel Site 🇵🇭</h1>
  </header>

  <div class="container">

    <div class="intro">
      <p>
        Welcome to my website about the Philippines. This site is currently under construction,
        so enjoy some photos of my trips there in the meantime.
      </p>
    </div>

    <div class="gallery">
      <img src="https://source.unsplash.com/800x600/?philippines,beach" alt="Beach in the Philippines">
      <img src="https://source.unsplash.com/800x600/?manila,city" alt="Manila city">
      <img src="https://source.unsplash.com/800x600/?palawan,island" alt="Palawan island">
      <img src="https://source.unsplash.com/800x600/?siargao,surf" alt="Siargao surfing">
      <img src="https://source.unsplash.com/800x600/?boracay,sunset" alt="Boracay sunset">
      <img src="https://source.unsplash.com/800x600/?philippines,nature" alt="Nature in the Philippines">
    </div>

  </div>

  <footer>
    © 2026 My Philippines Travel Project — Under Construction
  </footer>

</body>
</html>
